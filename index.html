var R=React,useState=R.useState,useMemo=R.useMemo,useReducer=R.useReducer,useRef=R.useRef,useEffect=R.useEffect,H=R.createElement;
var MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DOW=['sun','mon','tue','wed','thu','fri','sat'];
var DL=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var CLR=['#1d4ed8','#7c3aed','#be123c','#b45309','#166534','#0e7490','#1e3a8a','#9333ea','#c2410c','#15803d','#0369a1','#6d28d9','#881337','#92400e','#065f46','#0f766e','#312e81','#4c1d95','#7f1d1d','#78350f','#14532d','#134e4a','#1e40af','#3b0764','#9f1239','#431407'];

var DCSV='ID,Mon,Tue,Wed,Thu,Holiday,Max Shifts\nEMP-01,Y,Y,N,Y,No,Default\nEMP-02,N,Y,N,Y,No,Default\nEMP-03,Y,Y,N,N,Memorial Day,Default\nEMP-04,Y,N,Y,N,No,Default\nEMP-05,Y,Y,N,Y,No,Default\nEMP-06,Y,N,Y,Y,No,Default\nEMP-07,Y,Y,Y,Y,No,Default\nEMP-08,Y,N,Y,Y,No,Default\nEMP-09,Y,N,N,N,Christmas Eve,Default\nEMP-10,Y,Y,N,N,Columbus Day,Default\nEMP-11,Y,N,Y,Y,No,Default\nEMP-12,N,Y,Y,Y,No,Default\nEMP-13,N,N,N,Y,No,Default\nEMP-14,Y,N,N,N,No,Default\nEMP-15,N,Y,N,Y,No,Default\nEMP-16,Y,Y,Y,N,No,Default\nEMP-17,Y,Y,N,Y,Labor Day,Default\nEMP-18,Y,Y,N,Y,No,Default\nEMP-19,N,Y,Y,Y,No,Default\nEMP-20,Y,Y,Y,N,No,Default\nEMP-21,Y,Y,Y,N,No,Default\nEMP-22,N,Y,N,Y,November 25th,Default\nEMP-23,Y,N,Y,Y,No,Default\nEMP-24,Y,N,Y,Y,New Years Eve,Default\nEMP-25,Y,Y,N,Y,No,Default\nEMP-26,Y,N,Y,N,Thanksgiving,Default';

var GUIDE=[
  {key:'gs',icon:'🚀',title:'Getting started',content:[

];

function pad(n){return String(n).padStart(2,'0')}
function fd(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function pd(s){var p=s.split('-').map(Number);return new Date(p[0],p[1]-1,p[2])}
function nWD(y,m,w,n){var d=new Date(y,m,1),c=0;while(d.getMonth()===m){if(d.getDay()===w&&++c===n)return new Date(d);d.setDate(d.getDate()+1)}return null}
function lWD(y,m,w){var d=new Date(y,m+1,0);while(d.getDay()!==w)d.setDate(d.getDate()-1);return new Date(d)}
function empNum(id){return parseInt(id.replace(/\D/g,''))||0}
function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function fmtT(t){var d=new Date(t);return pad(d.getHours())+':'+pad(d.getMinutes())}
function vType(v){var s=String(v).trim().toLowerCase().replace(/\s/g,'');if(!s||s==='default')return'default';var n=parseInt(s);if(!isNaN(n)&&n>=0&&n<=20)return n;return'default'}
function scaleCap(cap,mo){if(cap==='default')return'default';return Math.max(1,Math.round(cap*mo/12))}
function tfMos(tf){return Math.max(1,(tf.endYear-tf.startYear)*12+(tf.endMonth-tf.startMonth)+1)}
function tfOk(tf){return tf.endYear*12+tf.endMonth>=tf.startYear*12+tf.startMonth+1}

function getVB(tf,ad){
  var tfS=new Date(tf.startYear,tf.startMonth,1);
  var tfE=new Date(tf.endYear,tf.endMonth+1,0);
  return{visS:new Date(tf.startYear-ad,tf.startMonth,1),visE:new Date(tf.endYear+1,tf.endMonth+1,0),tfS:tfS,tfE:tfE};
}

function getMTD(s,e){
  var out=[];
  for(var d=new Date(s);d<=e;d.setDate(d.getDate()+1)){if(d.getDay()>=1&&d.getDay()<=4)out.push(fd(d))}
  return out;
}

function buildHmap(by){
  var m={};
  function add(d,n,t){if(d&&!isNaN(d))m[fd(d)]={name:n,type:t}}
  for(var y=by-3;y<=by+3;y++){
    add(new Date(y,0,1),"New Year's Day",'federal');
    add(nWD(y,0,1,3),'MLK Day','federal');
    add(nWD(y,1,1,3),"Presidents' Day",'federal');
    add(lWD(y,4,1),'Memorial Day','federal');
    add(new Date(y,6,4),'Independence Day','federal');
    add(nWD(y,8,1,1),'Labor Day','federal');
    add(nWD(y,9,1,2),'Columbus Day','federal');
    add(new Date(y,10,11),'Veterans Day','federal');
    add(nWD(y,10,4,4),'Thanksgiving','federal');
    add(new Date(y,11,24),'Christmas Eve','federal');
    add(new Date(y,11,25),'Christmas Day','federal');
    add(new Date(y,11,31),"New Year's Eve",'federal');
    add(new Date(y,9,31),'Halloween','religious');
  }
  var rel={'2026-10-20':{name:'Diwali',type:'religious'},'2026-11-25':{name:'Office Holiday',type:'assigned'},'2026-12-04':{name:'Hanukkah',type:'religious'},'2027-03-09':{name:'Eid al-Fitr',type:'religious'},'2027-04-21':{name:'Passover',type:'religious'},'2027-05-17':{name:'Eid al-Adha ~',type:'religious'}};
  Object.keys(rel).forEach(function(k){m[k]=rel[k]});
  return m;
}

function resHol(str,visS,visE){
  if(!str||str.toLowerCase()==='no')return[];
  var lo=str.toLowerCase().trim(),out=[];
  for(var y=visS.getFullYear();y<=visE.getFullYear();y++){
    var d=null;
    if(lo.indexOf('labor day')>=0)d=nWD(y,8,1,1);
    else if(lo.indexOf('columbus day')>=0)d=nWD(y,9,1,2);
    else if(lo.indexOf('thanksgiving')>=0)d=nWD(y,10,4,4);
    else if(lo.indexOf('memorial day')>=0)d=lWD(y,4,1);
    else if(lo.indexOf('christmas eve')>=0)d=new Date(y,11,24);
    else if(lo.indexOf('new year')>=0)d=new Date(y,11,31);
    else{var mn=['january','february','march','april','may','june','july','august','september','october','november','december'];for(var i=0;i<12;i++){if(lo.indexOf(mn[i])>=0){var mx=lo.match(/\d+/);if(mx)d=new Date(y,i,+mx[0]);break}}}
    if(d){var ds=fd(d),p=pd(ds);if(p>=visS&&p<=visE&&p.getDay()>=1&&p.getDay()<=4)out.push(ds)}
  }
  return out;
}

function pCSV(txt){
  var ls=txt.trim().split('\n').filter(function(l){return l.trim()});
  var hs=ls[0].split(',').map(function(h){return h.trim().toLowerCase()});
  return ls.slice(1).map(function(l){
    var v=l.split(',').map(function(x){return x.trim()}),o={};
    hs.forEach(function(h,i){o[h]=v[i]||''});
    var ms=(o['max shifts']||'').toLowerCase();
    return{id:o['id'],mon:(o['mon']||'').toUpperCase()==='Y',tue:(o['tue']||'').toUpperCase()==='Y',wed:(o['wed']||'').toUpperCase()==='Y',thu:(o['thu']||'').toUpperCase()==='Y',holiday:(o['holiday']||'').toLowerCase()==='no'?null:o['holiday']||null,maxShifts:(ms==='default'||!ms)?'default':(parseInt(ms)||'default')};
  }).filter(function(e){return e.id});
}

function buildCSV(emps){
  var rows=['ID,Mon,Tue,Wed,Thu,Holiday,Max Shifts'];
  emps.forEach(function(e){rows.push(e.id+','+(e.mon?'Y':'N')+','+(e.tue?'Y':'N')+','+(e.wed?'Y':'N')+','+(e.thu?'Y':'N')+','+(e.holiday||'No')+','+(e.maxShifts==='default'?'Default':e.maxShifts))});
  return rows.join('\n');
}

function applyEdits(emps,edits){
  return emps.map(function(e){
    var ed=edits&&edits[e.id];if(!ed)return e;
    return{id:e.id,mon:ed.mon==='Y',tue:ed.tue==='Y',wed:ed.wed==='Y',thu:ed.thu==='Y',holiday:(!ed.holiday||ed.holiday.toLowerCase()==='no')?null:ed.holiday,maxShifts:ed.maxShifts};
  });
}

function calcTgts(emps,tfCount,mo){
  var fs=emps.length>0&&tfCount>0?Math.ceil(tfCount/emps.length):0;
  var excE=[],defE=[];
  emps.forEach(function(e){if(e.maxShifts!=='default')excE.push(e);else defE.push(e)});
  var tgt={};
  excE.forEach(function(e){tgt[e.id]=Math.min(scaleCap(e.maxShifts,mo),Math.max(1,fs))});
  var excT=excE.reduce(function(a,e){return a+(tgt[e.id]||0)},0);
  var defT=Math.max(0,tfCount-excT);
  var base=defE.length?Math.floor(defT/defE.length):0,rem=defE.length?defT%defE.length:0;
  defE.slice().sort(function(){return Math.random()-0.5}).forEach(function(e,i){tgt[e.id]=base+(i<rem?1:0)});
  return tgt;
}

function genSched(emps,b,ps,today){
  ps=ps||{};
  var allD=getMTD(b.visS,b.visE);
  var tfD=allD.filter(function(ds){var d=pd(ds);return d>=b.tfS&&d<=b.tfE});
  var ptD=allD.filter(function(ds){return pd(ds)>b.tfE});
  var mo=tfMos({startYear:b.tfS.getFullYear(),startMonth:b.tfS.getMonth(),endYear:b.tfE.getFullYear(),endMonth:b.tfE.getMonth()});
  var tgt=calcTgts(emps,tfD.length,mo);
  var sc=Object.assign({},ps),lk=new Set(),tfc={},ptc={},bm={};
  emps.forEach(function(e){tfc[e.id]=0;ptc[e.id]=0;bm[e.id]={}});
  Object.keys(ps).forEach(function(ds){
    var id=ps[ds];if(!id||tfc[id]===undefined)return;
    var d=pd(ds),mk=ds.slice(0,7);
    if(d>=b.tfS&&d<=b.tfE)tfc[id]++;else if(d>b.tfE)ptc[id]++;
    if(!today||d>=today)bm[id][mk]=(bm[id][mk]||0)+1;
  });
  emps.forEach(function(emp){
    if(!emp.holiday)return;
    resHol(emp.holiday,b.visS,b.visE).forEach(function(ds){
      if(allD.indexOf(ds)>=0&&!sc[ds]){
        sc[ds]=emp.id;lk.add(ds);
        var d=pd(ds),mk=ds.slice(0,7);
        if(d>=b.tfS&&d<=b.tfE)tfc[emp.id]++;else if(d>b.tfE)ptc[emp.id]++;
        if(!today||d>=today)bm[emp.id][mk]=(bm[emp.id][mk]||0)+1;
      }
    });
  });
  tfD.filter(function(d){return!sc[d]}).forEach(function(ds){
    var dow=DOW[pd(ds).getDay()],mk=ds.slice(0,7);
    function underTgt(p){return p.filter(function(e){return e[dow]&&(tfc[e.id]||0)<(tgt[e.id]||0)})}
    var pool=underTgt(emps).filter(function(e){return!bm[e.id][mk]});
    if(!pool.length)pool=underTgt(emps);
    if(!pool.length){
      // Relax cap: fill slot anyway to avoid blanks, pick fewest-calls employee
      var canWork=emps.filter(function(e){return e[dow]});
      pool=canWork.filter(function(e){return!bm[e.id][mk]});
      if(!pool.length)pool=canWork;
    }
    if(!pool.length)return;
    var mc=Math.min.apply(null,pool.map(function(e){return tfc[e.id]||0}));
    var top=pool.filter(function(e){return(tfc[e.id]||0)===mc});
    var ch=top[Math.floor(Math.random()*top.length)];
    sc[ds]=ch.id;tfc[ch.id]=(tfc[ch.id]||0)+1;bm[ch.id][mk]=(bm[ch.id][mk]||0)+1;
  });
  // Calculate planning year targets using same proportional logic
  var ptTgt={};
  if(ptD.length>0){
    var ptStart=pd(ptD[0]),ptEnd=pd(ptD[ptD.length-1]);
    var ptMo=Math.max(1,(ptEnd.getFullYear()-ptStart.getFullYear())*12+(ptEnd.getMonth()-ptStart.getMonth())+1);
    ptTgt=calcTgts(emps,ptD.length,ptMo);
  }
  ptD.filter(function(d){return!sc[d]}).forEach(function(ds){
    var dow=DOW[pd(ds).getDay()],mk=ds.slice(0,7);
    function ptUnder(p){return p.filter(function(e){return e[dow]&&(ptc[e.id]||0)<(ptTgt[e.id]||0)})}
    var pool=ptUnder(emps).filter(function(e){return!bm[e.id][mk]});
    if(!pool.length)pool=ptUnder(emps);
    if(!pool.length){
      var canWork=emps.filter(function(e){return e[dow]});
      pool=canWork.filter(function(e){return!bm[e.id][mk]});
      if(!pool.length)pool=canWork;
    }
    if(!pool.length)return;
    function tot(e){return(tfc[e.id]||0)+(ptc[e.id]||0)}
    var mc=Math.min.apply(null,pool.map(tot));
    var top=pool.filter(function(e){return tot(e)===mc});
    var ch=top[Math.floor(Math.random()*top.length)];
    sc[ds]=ch.id;ptc[ch.id]=(ptc[ch.id]||0)+1;bm[ch.id][mk]=(bm[ch.id][mk]||0)+1;
  });
  return{sched:sc,targets:tgt,allDates:allD,locked:lk,tfDates:tfD,postTfDates:ptD};
}

function extractPreserved(sched,b,lm,today){
  var p={};
  Object.keys(sched).forEach(function(ds){
    var d=pd(ds),mk=ds.slice(0,7);
    if(d<b.tfS||d<today||lm.has(mk))p[ds]=sched[ds];
  });
  return p;
}

function nextEmpId(emps,retiredIds,b){
  var active=new Set(emps.map(function(e){return empNum(e.id)}));
  var recyc=(retiredIds||[]).filter(function(r){return pd(r.lastDate)<b.visS}).map(function(r){return empNum(r.id)});
  if(recyc.length){return'EMP-'+String(Math.min.apply(null,recyc)).padStart(3,'0')}
  var blocked=new Set((retiredIds||[]).filter(function(r){return pd(r.lastDate)>=b.visS}).map(function(r){return empNum(r.id)}));
  var mx=Math.max(26,Math.max.apply(null,Array.from(active)));
  do{mx++}while(active.has(mx)||blocked.has(mx));
  return'EMP-'+String(mx).padStart(3,'0');
}

function redistRemoval(rid,sched,emps,lm,b,today,autoFill){
  var ns=Object.assign({},sched),future=[];
  Object.keys(sched).forEach(function(ds){if(sched[ds]===rid){var d=pd(ds);if(d>=b.tfS&&d>today)future.push(ds)}});
  var lockedSlots=future.filter(function(d){return lm.has(d.slice(0,7))});
  var regDates=future.filter(function(d){return!lm.has(d.slice(0,7))});
  var cnt={};emps.forEach(function(e){cnt[e.id]=Object.values(ns).filter(function(id){return id===e.id}).length});
  var filled=[],unfilled=[];
  function tryFill(ds){
    delete ns[ds];
    var dow=DOW[pd(ds).getDay()],mk=ds.slice(0,7);
    var asgn=new Set(Object.keys(ns).filter(function(d){return d.slice(0,7)===mk}).map(function(d){return ns[d]}));
    var elig=emps.filter(function(e){return e[dow]&&!asgn.has(e.id)&&(e.maxShifts==='default'||(cnt[e.id]||0)<e.maxShifts)}).sort(function(a,c){return(cnt[a.id]||0)-(cnt[c.id]||0)});
    if(elig.length){ns[ds]=elig[0].id;cnt[elig[0].id]=(cnt[elig[0].id]||0)+1;filled.push(ds)}else unfilled.push(ds);
  }
  regDates.forEach(tryFill);
  if(autoFill)lockedSlots.forEach(tryFill);
  else lockedSlots.forEach(function(d){delete ns[d];unfilled.push(d)});
  return{newSched:ns,filled:filled,unfilled:unfilled,lockedSlots:lockedSlots};
}

function getWkendDates(s,e){
  var out=[];
  for(var d=new Date(s);d<=e;d.setDate(d.getDate()+1)){var dw=d.getDay();if(dw===0||dw===5||dw===6)out.push(fd(d))}
  return out;
}

function resHolWkend(str,visS,visE){
  if(!str||str.toLowerCase()==='no')return[];
  var lo=str.toLowerCase().trim(),out=[];
  for(var y=visS.getFullYear();y<=visE.getFullYear();y++){
    var d=null;
    if(lo.indexOf('labor day')>=0)d=nWD(y,8,1,1);
    else if(lo.indexOf('columbus day')>=0)d=nWD(y,9,1,2);
    else if(lo.indexOf('thanksgiving')>=0)d=nWD(y,10,4,4);
    else if(lo.indexOf('memorial day')>=0)d=lWD(y,4,1);
    else if(lo.indexOf('christmas eve')>=0)d=new Date(y,11,24);
    else if(lo.indexOf('new year')>=0)d=new Date(y,11,31);
    else{var mn=['january','february','march','april','may','june','july','august','september','october','november','december'];for(var i=0;i<12;i++){if(lo.indexOf(mn[i])>=0){var mx=lo.match(/\d+/);if(mx)d=new Date(y,i,+mx[0]);break}}}
    if(d){var ds=fd(d),p=pd(ds),dw=p.getDay();if(p>=visS&&p<=visE&&(dw===0||dw===5||dw===6))out.push(ds)}
  }
  return out;
}

function extractPreservedWeekend(wSched,b,lm,today){
  var p={};
  Object.keys(wSched).forEach(function(ds){
    var d=pd(ds),mk=ds.slice(0,7);
    if(d<b.tfS||d<today||lm.has(mk)){
      var sl=wSched[ds];
      p[ds]={call:sl.call||null,p:sl.p||null,s:sl.s||null};
    }
  });
  return p;
}

function genWeekend(emps,b,wps,mtSched,today){
  wps=wps||{};
  var allWD=getWkendDates(b.visS,b.visE);
  var tfWD=allWD.filter(function(ds){var d=pd(ds);return d>=b.tfS&&d<=b.tfE});
  var ptWD=allWD.filter(function(ds){return pd(ds)>b.tfE});
  var tfSat=tfWD.filter(function(ds){return pd(ds).getDay()===6});
  var mo=tfMos({startYear:b.tfS.getFullYear(),startMonth:b.tfS.getMonth(),endYear:b.tfE.getFullYear(),endMonth:b.tfE.getMonth()});
  var callTgt=calcTgts(emps,tfWD.length,mo);
  var pTgt=calcTgts(emps,tfSat.length,mo);
  var sTgt=calcTgts(emps,tfSat.length,mo);
  var wsc={},callC={},pC={},sC={},callBm={},pBm={},sBm={};
  allWD.forEach(function(ds){var ex=wps[ds]||{};wsc[ds]={call:ex.call||null,p:ex.p||null,s:ex.s||null}});
  emps.forEach(function(e){callC[e.id]=0;pC[e.id]=0;sC[e.id]=0;callBm[e.id]={};pBm[e.id]={};sBm[e.id]={}});
  Object.keys(wps).forEach(function(ds){
    var sl=wps[ds],mk=ds.slice(0,7),d=pd(ds),inTf=(d>=b.tfS&&d<=b.tfE);
    if(sl.call&&callC[sl.call]!==undefined){if(inTf)callC[sl.call]++;if(!today||d>=today)callBm[sl.call][mk]=(callBm[sl.call][mk]||0)+1}
    if(sl.p&&pC[sl.p]!==undefined){if(inTf)pC[sl.p]++;if(!today||d>=today)pBm[sl.p][mk]=(pBm[sl.p][mk]||0)+1}
    if(sl.s&&sC[sl.s]!==undefined){if(inTf)sC[sl.s]++;if(!today||d>=today)sBm[sl.s][mk]=(sBm[sl.s][mk]||0)+1}
  });
  var wLkSet=new Set();
  emps.forEach(function(emp){
    if(!emp.holiday)return;
    resHolWkend(emp.holiday,b.visS,b.visE).forEach(function(ds){
      if(allWD.indexOf(ds)>=0&&!wsc[ds].call){
        wsc[ds].call=emp.id;wLkSet.add(ds);
        var d=pd(ds),mk=ds.slice(0,7);
        if(d>=b.tfS&&d<=b.tfE)callC[emp.id]++;
        if(!today||d>=today)callBm[emp.id][mk]=(callBm[emp.id][mk]||0)+1;
      }
    });
  });
  function getMtSet(mk){var s=new Set();Object.keys(mtSched).forEach(function(ds){if(ds.slice(0,7)===mk&&mtSched[ds])s.add(mtSched[ds])});return s}
  function wPool(cands,bm,mk,mtSet){
    var p;
    p=cands.filter(function(e){return!bm[e.id][mk]&&!mtSet.has(e.id)});if(p.length)return p;
    p=cands.filter(function(e){return!bm[e.id][mk]});if(p.length)return p;
    p=cands.filter(function(e){return!mtSet.has(e.id)});if(p.length)return p;
    return cands;
  }
  function wPick(pool,cntMap){
    if(!pool.length)return null;
    var mc=Math.min.apply(null,pool.map(function(e){return cntMap[e.id]||0}));
    var top=pool.filter(function(e){return(cntMap[e.id]||0)===mc});
    return top[Math.floor(Math.random()*top.length)];
  }
  function assignSlot(ds,slotKey,cntMap,tgtMap,bm,pref){
    var mk=ds.slice(0,7),mtSet=getMtSet(mk);
    var under=emps.filter(function(e){return(cntMap[e.id]||0)<(tgtMap[e.id]||0)});
    var cands=pref?under.filter(pref):under;
    var pool=wPool(cands.length?cands:under,bm,mk,mtSet);
    if(!pool.length)pool=wPool(pref?emps.filter(pref):emps,bm,mk,mtSet);
    if(!pool.length)pool=emps;
    var ch=wPick(pool,cntMap);
    if(!ch)return null;
    wsc[ds][slotKey]=ch.id;cntMap[ch.id]=(cntMap[ch.id]||0)+1;bm[ch.id][mk]=(bm[ch.id][mk]||0)+1;
    return ch;
  }
  // TF Saturdays: P then auto-link Call
  tfSat.filter(function(ds){return!wsc[ds].p&&!wLkSet.has(ds)}).forEach(function(ds){
    var mk=ds.slice(0,7),ch=assignSlot(ds,'p',pC,pTgt,pBm,null);
    if(ch&&!wsc[ds].call){wsc[ds].call=ch.id;callC[ch.id]=(callC[ch.id]||0)+1;callBm[ch.id][mk]=(callBm[ch.id][mk]||0)+1}
  });
  // TF Fri/Sun: Call
  tfWD.filter(function(ds){var dw=pd(ds).getDay();return!wsc[ds].call&&dw!==6}).forEach(function(ds){
    assignSlot(ds,'call',callC,callTgt,callBm,null);
  });
  // TF Saturdays: S (deprioritize those with P this month)
  tfSat.filter(function(ds){return!wsc[ds].s&&!wLkSet.has(ds)}).forEach(function(ds){
    var mk=ds.slice(0,7),noPref=function(e){return!pBm[e.id][mk]};
    assignSlot(ds,'s',sC,sTgt,sBm,noPref);
  });
  // Post-timeframe
  if(ptWD.length){
    var ptSat=ptWD.filter(function(ds){return pd(ds).getDay()===6});
    var ptEnd=pd(ptWD[ptWD.length-1]),ptStart=pd(ptWD[0]);
    var ptMo=Math.max(1,(ptEnd.getFullYear()-ptStart.getFullYear())*12+(ptEnd.getMonth()-ptStart.getMonth())+1);
    var ptCTgt=calcTgts(emps,ptWD.length,ptMo);
    var ptPTgt=calcTgts(emps,ptSat.length,ptMo);
    var ptSTgt=calcTgts(emps,ptSat.length,ptMo);
    var ptCC={},ptPC={},ptSC={};
    emps.forEach(function(e){ptCC[e.id]=0;ptPC[e.id]=0;ptSC[e.id]=0});
    Object.keys(wps).forEach(function(ds){
      var sl=wps[ds],d=pd(ds);
      if(d>b.tfE){
        if(sl.call&&ptCC[sl.call]!==undefined)ptCC[sl.call]++;
        if(sl.p&&ptPC[sl.p]!==undefined)ptPC[sl.p]++;
        if(sl.s&&ptSC[sl.s]!==undefined)ptSC[sl.s]++;
      }
    });
    function totCC(e){return(callC[e.id]||0)+(ptCC[e.id]||0)}
    function totPC(e){return(pC[e.id]||0)+(ptPC[e.id]||0)}
    function totSC(e){return(sC[e.id]||0)+(ptSC[e.id]||0)}
    function ptPool(cands,bm,mk){
      var mtSet=getMtSet(mk),p;
      p=cands.filter(function(e){return!bm[e.id][mk]&&!mtSet.has(e.id)});if(p.length)return p;
      p=cands.filter(function(e){return!bm[e.id][mk]});if(p.length)return p;
      p=cands.filter(function(e){return!mtSet.has(e.id)});if(p.length)return p;
      return cands;
    }
    function ptAssign(ds,slotKey,ptCnt,ptTgt,bm,totFn,pref){
      var mk=ds.slice(0,7);
      var under=emps.filter(function(e){return(ptCnt[e.id]||0)<(ptTgt[e.id]||0)});
      var cands=pref?under.filter(pref):under;
      var pool=ptPool(cands.length?cands:under,bm,mk);
      if(!pool.length)pool=ptPool(pref?emps.filter(pref):emps,bm,mk);
      if(!pool.length)pool=emps;
      if(!pool.length)return null;
      var mc=Math.min.apply(null,pool.map(totFn));
      var top=pool.filter(function(e){return totFn(e)===mc});
      var ch=top[Math.floor(Math.random()*top.length)];
      wsc[ds][slotKey]=ch.id;ptCnt[ch.id]=(ptCnt[ch.id]||0)+1;bm[ch.id][mk]=(bm[ch.id][mk]||0)+1;
      return ch;
    }
    ptSat.filter(function(ds){return!wsc[ds].p&&!wLkSet.has(ds)}).forEach(function(ds){
      var mk=ds.slice(0,7),ch=ptAssign(ds,'p',ptPC,ptPTgt,pBm,totPC,null);
      if(ch&&!wsc[ds].call){wsc[ds].call=ch.id;ptCC[ch.id]=(ptCC[ch.id]||0)+1;callBm[ch.id][mk]=(callBm[ch.id][mk]||0)+1}
    });
    ptWD.filter(function(ds){var dw=pd(ds).getDay();return!wsc[ds].call&&dw!==6}).forEach(function(ds){
      ptAssign(ds,'call',ptCC,ptCTgt,callBm,totCC,null);
    });
    ptSat.filter(function(ds){return!wsc[ds].s&&!wLkSet.has(ds)}).forEach(function(ds){
      var mk=ds.slice(0,7),noPref=function(e){return!pBm[e.id][mk]};
      ptAssign(ds,'s',ptSC,ptSTgt,sBm,totSC,noPref);
    });
  }
  var finalW={};
  Object.keys(wsc).forEach(function(ds){var sl=wsc[ds];if(sl.call||sl.p||sl.s)finalW[ds]=sl});
  return{wSched:finalW,wLocked:wLkSet,wCallTgt:callTgt,wPTgt:pTgt,wSTgt:sTgt,allWkendDates:allWD,tfWkendDates:tfWD,ptWkendDates:ptWD};
}

  return st;
}
